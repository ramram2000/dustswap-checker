<!DOCTYPE html>
<html>
<head>
  <title>DustSwap Wallet Checker</title>
  <meta charset="UTF-8">
</head>

<body style="text-align:center; font-family:sans-serif;">

  <h1>DustSwap Checker</h1>

  <button id="walletButton" onclick="handleWallet()" style="padding:10px 20px; font-size:16px;">
    Connect Wallet
  </button>

  <p id="wallet">Wallet: Not connected</p>
  <p id="balance"></p>
  <p id="network"></p>

  <script>
    let connected = false;
    let currentAccount = null;

    async function handleWallet() {
      if (!connected) {
        await connectWallet();
      } else {
        disconnectWallet();
      }
    }

    async function connectWallet() {
      if (!window.ethereum) {
        alert("MetaMask is not installed!");
        return;
      }

      try {
        const accounts = await window.ethereum.request({
          method: 'eth_requestAccounts'
        });

        currentAccount = accounts[0];
        connected = true;

        document.getElementById("wallet").innerText =
          "Wallet: " + currentAccount;

        // Network
        const chainId = await window.ethereum.request({
          method: 'eth_chainId'
        });

        document.getElementById("network").innerText =
          "Network: " + chainId;

        // Balance
        const balance = await window.ethereum.request({
          method: 'eth_getBalance',
          params: [currentAccount, "latest"]
        });

        const ethBalance = parseInt(balance, 16) / Math.pow(10, 18);

        document.getElementById("balance").innerText =
          "Balance: " + ethBalance.toFixed(4) + " ETH";

        // Change button text
        document.getElementById("walletButton").innerText =
          "Disconnect Wallet";

      } catch (error) {
        alert("Connection rejected");
        console.log(error);
      }
    }

    function disconnectWallet() {
      connected = false;
      currentAccount = null;

      document.getElementById("wallet").innerText =
        "Wallet: Not connected";

      document.getElementById("balance").innerText = "";
      document.getElementById("network").innerText = "";

      document.getElementById("walletButton").innerText =
        "Connect Wallet";
    }
  </script>

</body>
</html>
